<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayoub.Ai | منصة الذكاء الاصطناعي المجانية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Cairo', sans-serif;
        }
        
        /* أنماط الوضع الفاتح */
        body.light {
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #fce7f3 100%);
            color: #1a1a2e;
        }
        
        /* أنماط الوضع الداكن المحسن */
        body.dark {
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f23 50%, #1a0f2a 100%);
            color: #f0f0f0;
        }
        
        /* تنسيقات عامة */
        body {
            transition: all 0.3s ease;
            min-height: 100vh;
        }
        
        /* تأثير الزجاج المحسن */
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        
        body.dark .glass {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        /* تنسيق البطاقات */
        .card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        body.dark .card {
            background: rgba(20, 30, 55, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.25);
        }
        
        /* التدرج اللوني للنص */
        .gradient-text {
            background: linear-gradient(135deg, #c084fc, #ec4899, #8b5cf6);
            background-size: 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradient 3s ease infinite;
        }
        
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* أزرار مخصصة */
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
        }
        
        body.dark .btn-primary {
            background: linear-gradient(135deg, #a855f7, #db2777);
        }
        
        /* حقول الإدخال */
        .input-field {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
        }
        
        body.dark .input-field {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #334155;
            color: #f1f5f9;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }
        
        /* شريط التمرير */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(139, 92, 246, 0.1);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 10px;
        }
        
        /* تأثير الظهور */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        /* تنسيق النصوص في الوضع الداكن */
        body.dark .text-gray-600 {
            color: #cbd5e1 !important;
        }
        
        body.dark .text-gray-500 {
            color: #94a3b8 !important;
        }
        
        body.dark .text-gray-700 {
            color: #e2e8f0 !important;
        }
        
        body.dark .text-gray-800 {
            color: #f1f5f9 !important;
        }
        
        /* تنسيق الروابط */
        a, button {
            transition: all 0.2s ease;
        }
        
        /* تنسيق الـ Navbar في الوضع الداكن */
        body.dark nav.glass {
            background: rgba(10, 20, 35, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        /* تنسيق النتائج */
        .response-box {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 1rem;
            padding: 1rem;
        }
        
        body.dark .response-box {
            background: rgba(30, 41, 59, 0.6);
        }
    </style>
</head>
<body class="light">

<div id="app"></div>

<script>
    // ============= إعدادات Axios =============
    axios.defaults.baseURL = 'http://localhost:5000';
    
    // ============= حالة التطبيق =============
    let currentUser = null;
    let token = localStorage.getItem('token');
    let currentPage = 'home';
    let darkMode = localStorage.getItem('darkMode') === 'true';
    let apiKeys = { gemini: '', groq: '' };
    let history = [];
    let stats = { total: 0, today: 0 };
    let loginMode = 'login';
    
    // تطبيق الوضع الداكن
    if (darkMode) {
        document.body.classList.add('dark');
        document.body.classList.remove('light');
    } else {
        document.body.classList.add('light');
        document.body.classList.remove('dark');
    }
    
    if (token) {
        axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
    }
    
    // ============= دوال التنقل =============
    function navigateTo(page) {
        currentPage = page;
        render();
        if (page === 'dashboard') {
            fetchStats();
            fetchHistory();
        }
        if (page === 'history') {
            fetchHistory();
        }
    }
    
    // ============= عرض الصفحات =============
    async function render() {
        // شريط التنقل
        const navbar = `
            <nav class="glass fixed top-0 w-full z-50 border-b border-purple-500/20" style="backdrop-filter: blur(20px);">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex justify-between items-center h-16">
                        <!-- الشعار -->
                        <div class="flex items-center gap-3 cursor-pointer" onclick="navigateTo('home')">
                            <div class="w-8 h-8 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center">
                                <span class="text-white text-lg">✨</span>
                            </div>
                            <span class="text-2xl font-extrabold">
                                <span class="gradient-text">Ayoub.Ai</span>
                            </span>
                        </div>
                        
                        <!-- روابط سطح المكتب -->
                        <div class="hidden md:flex items-center gap-6">
                            ${currentUser ? `
                                <button onclick="navigateTo('dashboard')" class="text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 font-medium transition">الرئيسية</button>
                                <button onclick="navigateTo('text')" class="text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 font-medium transition">النصوص</button>
                                <button onclick="navigateTo('image')" class="text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 font-medium transition">الصور</button>
                                <button onclick="navigateTo('audio')" class="text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 font-medium transition">الصوت</button>
                                <button onclick="navigateTo('summarize')" class="text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 font-medium transition">تلخيص</button>
                                <button onclick="navigateTo('rewrite')" class="text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 font-medium transition">إعادة كتابة</button>
                                <button onclick="navigateTo('settings')" class="text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 transition">⚙️</button>
                                <button onclick="logout()" class="px-4 py-2 rounded-xl bg-gradient-to-r from-red-500 to-red-600 text-white text-sm font-semibold hover:shadow-lg transition">تسجيل خروج</button>
                            ` : `
                                <button onclick="navigateTo('login')" class="px-5 py-2 rounded-xl btn-primary text-white text-sm">دخول / حساب جديد</button>
                            `}
                            <button onclick="toggleDarkMode()" class="p-2 rounded-xl glass hover:scale-110 transition text-gray-700 dark:text-gray-200">
                                ${darkMode ? '☀️' : '🌙'}
                            </button>
                        </div>
                        
                        <!-- زر القائمة للجوال -->
                        <button id="menuBtn" class="md:hidden p-2 rounded-xl glass" onclick="toggleMobileMenu()">
                            <span class="text-gray-700 dark:text-gray-200">☰</span>
                        </button>
                    </div>
                </div>
                
                <!-- القائمة الجوالة -->
                <div id="mobileMenu" class="hidden md:hidden glass border-t border-purple-500/20">
                    <div class="p-4 flex flex-col gap-2">
                        ${currentUser ? `
                            <button onclick="navigateTo('dashboard'); closeMenu()" class="px-4 py-2 rounded-xl text-right text-gray-700 dark:text-gray-200 hover:bg-purple-500/10">🏠 الرئيسية</button>
                            <button onclick="navigateTo('text'); closeMenu()" class="px-4 py-2 rounded-xl text-right text-gray-700 dark:text-gray-200 hover:bg-purple-500/10">💬 النصوص</button>
                            <button onclick="navigateTo('image'); closeMenu()" class="px-4 py-2 rounded-xl text-right text-gray-700 dark:text-gray-200 hover:bg-purple-500/10">🎨 الصور</button>
                            <button onclick="navigateTo('audio'); closeMenu()" class="px-4 py-2 rounded-xl text-right text-gray-700 dark:text-gray-200 hover:bg-purple-500/10">🎤 الصوت</button>
                            <button onclick="navigateTo('settings'); closeMenu()" class="px-4 py-2 rounded-xl text-right text-gray-700 dark:text-gray-200 hover:bg-purple-500/10">⚙️ الإعدادات</button>
                            <button onclick="logout(); closeMenu()" class="px-4 py-2 rounded-xl bg-red-600 text-white text-right">🚪 تسجيل خروج</button>
                        ` : `
                            <button onclick="navigateTo('login'); closeMenu()" class="px-4 py-2 rounded-xl btn-primary text-white text-right">🔐 دخول / حساب جديد</button>
                        `}
                    </div>
                </div>
            </nav>
            <div class="h-16"></div>
        `;
        
        // محتوى الصفحة
        let content = '';
        
        switch(currentPage) {
            case 'home':
                content = `
                    <div class="fade-in">
                        <div class="relative overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-r from-purple-600/20 to-pink-600/20 blur-3xl"></div>
                            <div class="max-w-6xl mx-auto px-4 py-20 text-center relative">
                                <div class="inline-flex gap-2 px-4 py-2 rounded-full glass mb-6 border border-purple-500/30">
                                    <span class="text-sm font-medium text-gray-700 dark:text-gray-300">✨ جميع أدوات الذكاء الاصطناعي في مكان واحد | مجاناً بالكامل</span>
                                </div>
                                <h1 class="text-5xl md:text-7xl font-bold mb-6">
                                    <span class="gradient-text">Ayoub.Ai</span>
                                    <br>
                                    <span class="text-gray-800 dark:text-white">منصة الذكاء الاصطناعي المجانية</span>
                                </h1>
                                <p class="text-xl text-gray-600 dark:text-gray-300 mb-8 max-w-2xl mx-auto leading-relaxed">
                                    وصول مجاني إلى Gemini و Groq و DeepSeek و Stability AI والمزيد — واجهة واحدة احترافية
                                </p>
                                <div class="flex gap-4 justify-center flex-wrap">
                                    ${!currentUser ? 
                                        `<button onclick="navigateTo('login')" class="px-8 py-3 rounded-xl btn-primary text-white hover:shadow-xl transition font-semibold text-lg">ابدأ مجاناً →</button>` :
                                        `<button onclick="navigateTo('dashboard')" class="px-8 py-3 rounded-xl btn-primary text-white hover:shadow-xl transition font-semibold text-lg">لوحة التحكم →</button>`
                                    }
                                    <button onclick="navigateTo('text')" class="px-8 py-3 rounded-xl glass hover:scale-105 transition font-semibold text-gray-700 dark:text-gray-200 border border-purple-500/30">جرب النموذج</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="max-w-6xl mx-auto px-4 py-20">
                            <h2 class="text-3xl font-bold text-center mb-4 text-gray-800 dark:text-white">كل ما تحتاجه في مكان واحد</h2>
                            <p class="text-center text-gray-600 dark:text-gray-400 mb-12">أدوات ذكاء اصطناعي متطورة بالكامل مجاناً</p>
                            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                ${[
                                    { icon: '💬', name: 'النصوص الذكية', desc: 'كتابة، إعادة صياغة، تلخيص، وأكواد برمجية', page: 'text' },
                                    { icon: '🎨', name: 'توليد الصور', desc: 'إنشاء صور احترافية من النصوص', page: 'image' },
                                    { icon: '🎤', name: 'الصوتيات', desc: 'تحويل النص إلى صوت طبيعي', page: 'audio' },
                                    { icon: '📝', name: 'تلخيص النصوص', desc: 'تلخيص المقالات الطويلة بذكاء', page: 'summarize' },
                                    { icon: '✏️', name: 'إعادة الكتابة', desc: 'تحسين النصوص وجعلها احترافية', page: 'rewrite' },
                                    { icon: '🔮', name: 'المزيد قريباً', desc: 'أدوات فيديو وتحليل بيانات', page: 'home' },
                                ].map(tool => `
                                    <div class="card p-6 cursor-pointer" onclick="navigateTo('${tool.page}')">
                                        <div class="text-5xl mb-4">${tool.icon}</div>
                                        <h3 class="text-xl font-semibold mb-2 text-gray-800 dark:text-white">${tool.name}</h3>
                                        <p class="text-gray-600 dark:text-gray-400 text-sm">${tool.desc}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="py-20" style="background: rgba(139, 92, 246, 0.05);">
                            <div class="max-w-6xl mx-auto px-4 text-center">
                                <h2 class="text-3xl font-bold mb-4 text-gray-800 dark:text-white">النماذج المجانية المدعومة</h2>
                                <p class="text-gray-600 dark:text-gray-400 mb-12">أحدث نماذج الذكاء الاصطناعي بتقنيات متطورة</p>
                                <div class="flex flex-wrap justify-center gap-3">
                                    ${['Gemini Pro', 'Groq Mixtral', 'DeepSeek Coder', 'ElevenLabs', 'Stable Diffusion XL', 'LLaMA 2', 'Mistral 7B'].map(m => 
                                        `<span class="px-4 py-2 rounded-full glass border border-purple-500/30 text-sm font-medium text-gray-700 dark:text-gray-300">✨ ${m}</span>`
                                    ).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                break;
                
            case 'login':
                content = `
                    <div class="min-h-screen flex items-center justify-center px-4 py-20">
                        <div class="card p-8 max-w-md w-full">
                            <div class="text-center mb-8">
                                <div class="w-16 h-16 rounded-2xl bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center mx-auto mb-4">
                                    <span class="text-3xl">${loginMode === 'login' ? '🔐' : '✨'}</span>
                                </div>
                                <h2 class="text-2xl font-bold text-gray-800 dark:text-white">${loginMode === 'login' ? 'مرحباً بعودتك' : 'إنشاء حساب جديد'}</h2>
                                <p class="text-gray-500 dark:text-gray-400 text-sm mt-2">${loginMode === 'login' ? 'سجل الدخول للوصول إلى جميع الأدوات' : 'انضم إلينا واستخدم الذكاء الاصطناعي مجاناً'}</p>
                            </div>
                            
                            <form onsubmit="handleAuth(event)">
                                <input type="email" id="email" placeholder="البريد الإلكتروني" class="input-field w-full px-4 py-3 rounded-xl mb-3" required>
                                <input type="password" id="password" placeholder="كلمة المرور" class="input-field w-full px-4 py-3 rounded-xl mb-3" required>
                                <input type="text" id="name" placeholder="الاسم الكامل" class="input-field w-full px-4 py-3 rounded-xl mb-4 ${loginMode === 'login' ? 'hidden' : ''}" ${loginMode === 'login' ? 'style="display:none"' : ''}>
                                <button type="submit" class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-lg">${loginMode === 'login' ? 'تسجيل الدخول' : 'إنشاء حساب'}</button>
                            </form>
                            
                            <div class="mt-4 text-center">
                                <button onclick="toggleLoginMode()" class="text-purple-600 dark:text-purple-400 text-sm hover:underline">
                                    ${loginMode === 'login' ? 'ليس لديك حساب؟ سجل الآن' : 'لديك حساب بالفعل؟ تسجيل الدخول'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                break;
                
            case 'dashboard':
                content = `
                    <div class="max-w-6xl mx-auto px-4 py-20 fade-in">
                        <div class="mb-8">
                            <h1 class="text-3xl font-bold text-gray-800 dark:text-white">مرحباً، ${currentUser?.name || 'مستخدم'}! 👋</h1>
                            <p class="text-gray-600 dark:text-gray-400">هذه لوحة تحكم أدوات الذكاء الاصطناعي الخاصة بك</p>
                        </div>
                        
                        <div class="grid md:grid-cols-3 gap-6 mb-12">
                            <div class="card p-6 border-t-4 border-purple-500">
                                <div class="text-3xl font-bold gradient-text">${stats.total || 0}</div>
                                <p class="text-gray-600 dark:text-gray-400 mt-2">إجمالي مرات الاستخدام</p>
                            </div>
                            <div class="card p-6 border-t-4 border-pink-500">
                                <div class="text-3xl font-bold gradient-text">${stats.today || 0}</div>
                                <p class="text-gray-600 dark:text-gray-400 mt-2">استخدامات اليوم</p>
                            </div>
                            <div class="card p-6 border-t-4 border-blue-500">
                                <div class="text-3xl font-bold gradient-text">8+</div>
                                <p class="text-gray-600 dark:text-gray-400 mt-2">نموذج ذكاء اصطناعي</p>
                            </div>
                        </div>
                        
                        <div class="grid md:grid-cols-4 gap-4 mb-12">
                            ${[
                                { name: 'النصوص', icon: '💬', page: 'text' },
                                { name: 'الصور', icon: '🎨', page: 'image' },
                                { name: 'الصوت', icon: '🎤', page: 'audio' },
                                { name: 'تلخيص', icon: '📝', page: 'summarize' },
                            ].map(tool => `
                                <button onclick="navigateTo('${tool.page}')" class="card p-4 text-center hover:scale-105 transition">
                                    <div class="text-3xl mb-2">${tool.icon}</div>
                                    <span class="font-semibold text-gray-700 dark:text-gray-200">${tool.name}</span>
                                </button>
                            `).join('')}
                        </div>
                        
                        <div class="card p-6">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-xl font-semibold text-gray-800 dark:text-white">📜 آخر النشاطات</h2>
                                <button onclick="navigateTo('history')" class="text-purple-600 dark:text-purple-400 text-sm hover:underline">عرض الكل →</button>
                            </div>
                            ${history.length === 0 ? 
                                '<div class="text-center py-8 text-gray-500">لا يوجد نشاطات بعد. ابدأ باستخدام الأدوات!</div>' :
                                history.slice(0, 5).map(item => `
                                    <div class="flex items-center gap-3 p-3 rounded-xl hover:bg-purple-500/5 transition">
                                        <span class="text-2xl">${item.type === 'text' ? '💬' : item.type === 'image' ? '🎨' : '🎤'}</span>
                                        <div class="flex-1">
                                            <p class="text-sm text-gray-700 dark:text-gray-300">${item.input}</p>
                                            <p class="text-xs text-gray-500">${new Date(item.date).toLocaleString('ar')}</p>
                                        </div>
                                    </div>
                                `).join('')
                            }
                        </div>
                    </div>
                `;
                break;
                
            case 'text':
                content = `
                    <div class="max-w-5xl mx-auto px-4 py-20 fade-in">
                        <div class="text-center mb-8">
                            <h1 class="text-3xl font-bold flex items-center justify-center gap-2 text-gray-800 dark:text-white">💬 <span>محرر النصوص الذكي</span></h1>
                            <p class="text-gray-600 dark:text-gray-400">توليد، إعادة صياغة، كتابة أكواد، وأكثر</p>
                        </div>
                        
                        <div class="grid lg:grid-cols-3 gap-6">
                            <div class="card p-6">
                                <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">اختر النموذج</label>
                                <select id="modelSelect" class="input-field w-full px-4 py-2 rounded-xl mb-4">
                                    <option value="gemini">✨ Gemini Pro (جوجل)</option>
                                    <option value="groq">⚡ Groq Mixtral (سريع)</option>
                                </select>
                                
                                <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">أمثلة سريعة</label>
                                <div class="space-y-2">
                                    ${['اشرح لي الحوسبة الكمية ببساطة', 'اكتب لي قصيدة قصيرة عن الذكاء الاصطناعي', 'كيف أصبح مبرمجاً محترفاً؟'].map(ex => 
                                        `<button onclick="document.getElementById('promptInput').value='${ex}'" class="w-full text-right px-3 py-2 text-sm rounded-xl glass hover:bg-purple-500/10 transition text-gray-700 dark:text-gray-300">📌 ${ex}</button>`
                                    ).join('')}
                                </div>
                            </div>
                            
                            <div class="lg:col-span-2 space-y-4">
                                <div class="card p-6">
                                    <textarea id="promptInput" rows="5" placeholder="اكتب سؤالك أو النص الذي تريد معالجته..." class="input-field w-full p-4 rounded-xl resize-none"></textarea>
                                    <button onclick="generateText()" id="generateBtn" class="btn-primary w-full mt-4 py-3 rounded-xl text-white font-semibold">✨ توليد الآن</button>
                                </div>
                                
                                <div id="responseArea" class="card p-6 hidden">
                                    <div class="flex justify-between items-center mb-3">
                                        <h3 class="font-semibold text-gray-800 dark:text-white">🤖 الرد الذكي</h3>
                                        <button onclick="copyResponse()" class="px-3 py-1 rounded-xl glass text-sm hover:bg-purple-500/10">📋 نسخ</button>
                                    </div>
                                    <div id="responseText" class="whitespace-pre-wrap leading-relaxed text-gray-700 dark:text-gray-300"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                break;
                
            case 'image':
                content = `
                    <div class="max-w-5xl mx-auto px-4 py-20 fade-in">
                        <div class="text-center mb-8">
                            <h1 class="text-3xl font-bold flex items-center justify-center gap-2 text-gray-800 dark:text-white">🎨 <span>توليد الصور بالذكاء الاصطناعي</span></h1>
                            <p class="text-gray-600 dark:text-gray-400">حوّل أفكارك إلى صور احترافية</p>
                        </div>
                        
                        <div class="grid md:grid-cols-2 gap-8">
                            <div class="card p-6">
                                <textarea id="imagePrompt" rows="4" placeholder="مثال: غروب شمس جميل فوق الجبال، تفاصيل عالية، نمط رقمي" class="input-field w-full p-4 rounded-xl mb-4"></textarea>
                                <button onclick="generateImage()" id="imageGenBtn" class="btn-primary w-full py-3 rounded-xl text-white font-semibold">🎨 إنشاء الصورة</button>
                                <div class="mt-4 p-3 rounded-xl bg-purple-500/10">
                                    <p class="text-xs text-gray-600 dark:text-gray-400">💡 نصائح: كن محدداً، أضف أسلوباً (واقعي، كرتوني، زيتي)</p>
                                </div>
                            </div>
                            
                            <div class="card p-6 flex items-center justify-center min-h-[350px]" id="imageResult">
                                <div class="text-center text-gray-400">
                                    <div class="text-6xl mb-3">🖼️</div>
                                    <p>الصورة المولدة ستظهر هنا</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                break;
                
            case 'audio':
                content = `
                    <div class="max-w-3xl mx-auto px-4 py-20 fade-in">
                        <div class="text-center mb-8">
                            <h1 class="text-3xl font-bold flex items-center justify-center gap-2 text-gray-800 dark:text-white">🎤 <span>تحويل النص إلى صوت</span></h1>
                            <p class="text-gray-600 dark:text-gray-400">حوّل أي نص إلى صوت بشري طبيعي</p>
                        </div>
                        
                        <div class="card p-8">
                            <textarea id="ttsText" rows="5" placeholder="اكتب النص الذي تريد تحويله إلى صوت..." class="input-field w-full p-4 rounded-xl mb-4"></textarea>
                            <button onclick="generateSpeech()" id="ttsBtn" class="btn-primary w-full py-3 rounded-xl text-white font-semibold">🔊 تحويل إلى صوت</button>
                            
                            <div id="audioResult" class="mt-6 hidden">
                                <audio id="audioPlayer" controls class="w-full rounded-xl"></audio>
                            </div>
                        </div>
                    </div>
                `;
                break;
                
            case 'summarize':
                content = `
                    <div class="max-w-4xl mx-auto px-4 py-20 fade-in">
                        <div class="text-center mb-8">
                            <h1 class="text-3xl font-bold flex items-center justify-center gap-2 text-gray-800 dark:text-white">📝 <span>تلخيص النصوص</span></h1>
                            <p class="text-gray-600 dark:text-gray-400">لخّص المقالات والمستندات الطويلة بذكاء</p>
                        </div>
                        
                        <div class="card p-6">
                            <textarea id="summarizeText" rows="8" placeholder="الصق النص الذي تريد تلخيصه هنا..." class="input-field w-full p-4 rounded-xl mb-4"></textarea>
                            <button onclick="summarizeText()" id="summarizeBtn" class="btn-primary w-full py-3 rounded-xl text-white font-semibold">📄 تلخيص</button>
                            
                            <div id="summarizeResult" class="mt-6 hidden">
                                <div class="flex justify-between items-center mb-3">
                                    <h3 class="font-semibold text-gray-800 dark:text-white">📌 الملخص الذكي</h3>
                                    <button onclick="copySummary()" class="px-3 py-1 rounded-xl glass text-sm">📋 نسخ</button>
                                </div>
                                <div id="summaryText" class="p-4 rounded-xl bg-purple-500/5 leading-relaxed text-gray-700 dark:text-gray-300"></div>
                            </div>
                        </div>
                    </div>
                `;
                break;
                
            case 'rewrite':
                content = `
                    <div class="max-w-4xl mx-auto px-4 py-20 fade-in">
                        <div class="text-center mb-8">
                            <h1 class="text-3xl font-bold flex items-center justify-center gap-2 text-gray-800 dark:text-white">✏️ <span>إعادة الكتابة الاحترافية</span></h1>
                            <p class="text-gray-600 dark:text-gray-400">حسّن نصوصك واجعلها أكثر احترافية</p>
                        </div>
                        
                        <div class="card p-6">
                            <textarea id="rewriteText" rows="8" placeholder="الصق النص الذي تريد تحسينه..." class="input-field w-full p-4 rounded-xl mb-4"></textarea>
                            <button onclick="rewriteText()" id="rewriteBtn" class="btn-primary w-full py-3 rounded-xl text-white font-semibold">✏️ إعادة كتابة</button>
                            
                            <div id="rewriteResult" class="mt-6 hidden">
                                <div class="flex justify-between items-center mb-3">
                                    <h3 class="font-semibold text-gray-800 dark:text-white">✨ النص المحسن</h3>
                                    <button onclick="copyRewritten()" class="px-3 py-1 rounded-xl glass text-sm">📋 نسخ</button>
                                </div>
                                <div id="rewrittenText" class="p-4 rounded-xl bg-purple-500/5 leading-relaxed text-gray-700 dark:text-gray-300"></div>
                            </div>
                        </div>
                    </div>
                `;
                break;
                
            case 'settings':
                content = `
                    <div class="max-w-3xl mx-auto px-4 py-20 fade-in">
                        <h1 class="text-3xl font-bold mb-8 text-center text-gray-800 dark:text-white">⚙️ الإعدادات</h1>
                        
                        <div class="card p-6 mb-6">
                            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2 text-gray-800 dark:text-white">🔑 مفاتيح API (اختياري)</h2>
                            <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">استخدم مفاتيحك الخاصة للحصول على حدود أعلى. اتركها فارغة لاستخدام المفتاح المجاني المشترك.</p>
                            
                            <div class="mb-3">
                                <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Gemini API Key</label>
                                <input type="password" id="key_gemini" placeholder="AIzaSy..." class="input-field w-full px-4 py-2 rounded-xl" value="${apiKeys.gemini || ''}">
                                <p class="text-xs text-gray-500 mt-1">احصل على مفتاح مجاني من <a href="https://makersuite.google.com/app/apikey" target="_blank" class="text-purple-600 dark:text-purple-400">Google AI Studio</a></p>
                            </div>
                            
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Groq API Key</label>
                                <input type="password" id="key_groq" placeholder="gsk_..." class="input-field w-full px-4 py-2 rounded-xl" value="${apiKeys.groq || ''}">
                                <p class="text-xs text-gray-500 mt-1">احصل على مفتاح مجاني من <a href="https://console.groq.com/keys" target="_blank" class="text-purple-600 dark:text-purple-400">Groq Console</a></p>
                            </div>
                            
                            <button onclick="saveApiKeys()" class="btn-primary w-full py-2 rounded-xl text-white font-semibold">💾 حفظ المفاتيح</button>
                        </div>
                        
                        <div class="card p-6">
                            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2 text-gray-800 dark:text-white">🎨 المظهر</h2>
                            <button onclick="toggleDarkMode()" class="px-4 py-2 rounded-xl glass w-full md:w-auto text-gray-700 dark:text-gray-300">${darkMode ? '☀️ الوضع الفاتح' : '🌙 الوضع الداكن'}</button>
                        </div>
                    </div>
                `;
                break;
                
            case 'history':
                content = `
                    <div class="max-w-5xl mx-auto px-4 py-20 fade-in">
                        <h1 class="text-3xl font-bold mb-8 text-center flex items-center justify-center gap-2 text-gray-800 dark:text-white">📜 <span>سجل الاستخدام</span></h1>
                        
                        <div id="historyList" class="space-y-3">
                            ${history.length === 0 ? 
                                '<div class="card p-8 text-center text-gray-500">📭 لا يوجد سجل بعد. ابدأ باستخدام الأدوات!</div>' :
                                history.map(item => `
                                    <div class="card p-4 hover:scale-[1.02] transition">
                                        <div class="flex items-center gap-3">
                                            <span class="text-3xl">${item.type === 'text' ? '💬' : item.type === 'image' ? '🎨' : '🎤'}</span>
                                            <div class="flex-1">
                                                <p class="font-medium text-gray-800 dark:text-gray-200">${item.input}</p>
                                                <div class="flex gap-3 mt-1">
                                                    <p class="text-xs text-gray-500">${new Date(item.date).toLocaleString('ar')}</p>
                                                    ${item.model ? `<p class="text-xs text-purple-600 dark:text-purple-400">النموذج: ${item.model}</p>` : ''}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')
                            }
                        </div>
                    </div>
                `;
                break;
        }
        
        document.getElementById('app').innerHTML = navbar + content;
    }
    
    // ============= دوال القائمة =============
    function toggleMobileMenu() {
        const menu = document.getElementById('mobileMenu');
        if (menu) menu.classList.toggle('hidden');
    }
    
    function closeMenu() {
        const menu = document.getElementById('mobileMenu');
        if (menu) menu.classList.add('hidden');
    }
    
    // ============= دوال المصادقة =============
    async function handleAuth(event) {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const name = document.getElementById('name')?.value;
        
        const endpoint = loginMode === 'login' ? '/api/login' : '/api/register';
        const body = loginMode === 'login' ? { email, password } : { name, email, password };
        
        try {
            const res = await axios.post(endpoint, body);
            token = res.data.token;
            currentUser = res.data.user;
            localStorage.setItem('token', token);
            axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
            navigateTo('dashboard');
            await fetchStats();
            await fetchHistory();
        } catch (error) {
            alert(error.response?.data?.error || 'حدث خطأ، حاول مرة أخرى');
        }
    }
    
    function toggleLoginMode() {
        loginMode = loginMode === 'login' ? 'register' : 'login';
        render();
    }
    
    async function logout() {
        localStorage.removeItem('token');
        delete axios.defaults.headers.common['Authorization'];
        currentUser = null;
        token = null;
        navigateTo('home');
    }
    
    // ============= دوال الأدوات =============
    async function generateText() {
        const prompt = document.getElementById('promptInput')?.value;
        const model = document.getElementById('modelSelect')?.value;
        const btn = document.getElementById('generateBtn');
        if (!prompt) return alert('الرجاء إدخال نص');
        
        btn.innerHTML = '⏳ جاري التوليد...';
        btn.disabled = true;
        
        try {
            const res = await axios.post('/api/generate/text', { model, prompt });
            document.getElementById('responseArea').classList.remove('hidden');
            document.getElementById('responseText').innerHTML = res.data.result;
            await fetchHistory();
        } catch (error) {
            alert(error.response?.data?.error || 'فشل التوليد');
        }
        
        btn.innerHTML = '✨ توليد الآن';
        btn.disabled = false;
    }
    
    async function generateImage() {
        const prompt = document.getElementById('imagePrompt')?.value;
        const btn = document.getElementById('imageGenBtn');
        if (!prompt) return alert('الرجاء إدخال وصف للصورة');
        
        btn.innerHTML = '⏳ جاري الإنشاء...';
        btn.disabled = true;
        
        try {
            const res = await axios.post('/api/generate/image', { prompt });
            document.getElementById('imageResult').innerHTML = `<img src="${res.data.image}" class="w-full rounded-xl shadow-lg">`;
            await fetchHistory();
        } catch (error) {
            alert(error.response?.data?.error || 'فشل إنشاء الصورة');
        }
        
        btn.innerHTML = '🎨 إنشاء الصورة';
        btn.disabled = false;
    }
    
    async function generateSpeech() {
        const text = document.getElementById('ttsText')?.value;
        const btn = document.getElementById('ttsBtn');
        if (!text) return alert('الرجاء إدخال نص');
        
        btn.innerHTML = '⏳ جاري التحويل...';
        btn.disabled = true;
        
        try {
            const res = await axios.post('/api/generate/tts', { text });
            document.getElementById('audioResult').classList.remove('hidden');
            const audio = document.getElementById('audioPlayer');
            audio.src = res.data.audio;
            audio.play();
            await fetchHistory();
        } catch (error) {
            alert(error.response?.data?.error || 'فشل تحويل النص إلى صوت');
        }
        
        btn.innerHTML = '🔊 تحويل إلى صوت';
        btn.disabled = false;
    }
    
    async function summarizeText() {
        const text = document.getElementById('summarizeText')?.value;
        const btn = document.getElementById('summarizeBtn');
        if (!text) return alert('الرجاء إدخال نص');
        
        btn.innerHTML = '⏳ جاري التلخيص...';
        btn.disabled = true;
        
        try {
            const res = await axios.post('/api/summarize', { text });
            document.getElementById('summarizeResult').classList.remove('hidden');
            document.getElementById('summaryText').innerHTML = res.data.summary;
        } catch (error) {
            alert(error.response?.data?.error || 'فشل التلخيص');
        }
        
        btn.innerHTML = '📄 تلخيص';
        btn.disabled = false;
    }
    
    async function rewriteText() {
        const text = document.getElementById('rewriteText')?.value;
        const btn = document.getElementById('rewriteBtn');
        if (!text) return alert('الرجاء إدخال نص');
        
        btn.innerHTML = '⏳ جاري الكتابة...';
        btn.disabled = true;
        
        try {
            const res = await axios.post('/api/rewrite', { text });
            document.getElementById('rewriteResult').classList.remove('hidden');
            document.getElementById('rewrittenText').innerHTML = res.data.rewritten;
        } catch (error) {
            alert(error.response?.data?.error || 'فشل إعادة الكتابة');
        }
        
        btn.innerHTML = '✏️ إعادة كتابة';
        btn.disabled = false;
    }
    
    function copyResponse() {
        const text = document.getElementById('responseText')?.innerText;
        if (text) { navigator.clipboard.writeText(text); alert('تم النسخ!'); }
    }
    
    function copySummary() {
        const text = document.getElementById('summaryText')?.innerText;
        if (text) { navigator.clipboard.writeText(text); alert('تم النسخ!'); }
    }
    
    function copyRewritten() {
        const text = document.getElementById('rewrittenText')?.innerText;
        if (text) { navigator.clipboard.writeText(text); alert('تم النسخ!'); }
    }
    
    // ============= دوال البيانات =============
    async function fetchHistory() {
        if (!token) return;
        try {
            const res = await axios.get('/api/history');
            history = res.data.history || [];
            if (currentPage === 'history') render();
        } catch (error) { console.error(error); }
    }
    
    async function fetchStats() {
        if (!token) return;
        try {
            const res = await axios.get('/api/stats');
            stats = res.data;
        } catch (error) { console.error(error); }
    }
    
    async function saveApiKeys() {
        const keys = {
            gemini: document.getElementById('key_gemini')?.value || '',
            groq: document.getElementById('key_groq')?.value || ''
        };
        apiKeys = keys;
        try {
            await axios.put('/api/keys', keys);
            alert('تم حفظ المفاتيح بنجاح!');
        } catch (error) {
            alert('فشل حفظ المفاتيح');
        }
    }
    
    function toggleDarkMode() {
        darkMode = !darkMode;
        localStorage.setItem('darkMode', darkMode);
        if (darkMode) {
            document.body.classList.add('dark');
            document.body.classList.remove('light');
        } else {
            document.body.classList.add('light');
            document.body.classList.remove('dark');
        }
        render();
    }
    
    // ============= تحميل المستخدم =============
    async function loadUser() {
        if (!token) return;
        try {
            const res = await axios.get('/api/me');
            currentUser = res.data;
            apiKeys = currentUser.apiKeys || { gemini: '', groq: '' };
            await fetchHistory();
            await fetchStats();
            render();
        } catch (error) {
            localStorage.removeItem('token');
            delete axios.defaults.headers.common['Authorization'];
            currentUser = null;
            render();
        }
    }
    
    // بدء التطبيق
    if (token) loadUser();
    else render();
</script>
</body>
</html>
